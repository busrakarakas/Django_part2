<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <title>Büşra'nın Web Sayfası</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            font-family: Arial, sans-serif;
            text-align: center;
            color: white;
            padding: 40px;
        }

        /* Her proje için ayrı kart stili */
        .kart {
            background: white;
            color: black;
            width: 400px;
            margin: 20px auto; /* Kartlar alt alta gelsin diye boşluk bıraktık */
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.3);
        }

        h1 { color: #ffffff; margin-bottom: 30px; }
        h2 { color: #764ba2; margin-top: 0; }
    </style>
</head>
<body>

    <h1>Büşra'nın Web Portfolyosu</h1>

    {% for proje in projeler %}
        <div class="kart">
            <h2>{{ proje.baslik }}</h2>
            <p>{{ proje.detay }}</p>
            <p><small>Eklenme: {{ proje.eklenme_tarihi }}</small></p>
        </div>
    {% empty %}
        <div class="kart">
            <p>Henüz bir proje eklenmemiş.</p>
        </div>
    {% endfor %}

</body>
</html>
